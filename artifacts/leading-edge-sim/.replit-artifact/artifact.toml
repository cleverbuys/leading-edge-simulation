kind = "web"
previewPath = "/"
title = "Leading Edge Simulation"
version = "1.0.0"
id = "artifacts/leading-edge-sim"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25378

[services.development]
run = "pnpm --filter @workspace/leading-edge-sim run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/leading-edge-sim", "run", "build" ]
publicDir = "artifacts/leading-edge-sim/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25378"
BASE_PATH = "/"
